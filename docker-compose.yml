services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-uptime}
      MYSQL_USER: ${MYSQL_USER:-uptime}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-uptime}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-uptime}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-uptime}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-uptime}
      MYSQL_USER: ${MYSQL_USER:-uptime}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-uptime}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      CHECK_INTERVAL_SECONDS: ${CHECK_INTERVAL_SECONDS:-60}
      PORT: 8000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db_data:
